defaults:
  - env_vars: env_vars
  - encoder: dino_patch # dino_patch_avg_pool
  - _self_
  - override hydra/launcher: submitit_slurm

hydra:
  run:
    dir: ${env_vars.save_path}/outputs/${env.gym.id}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: True
  sweep:
    dir: ${env_vars.save_path}/outputs/${env.gym.id}/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    submitit_folder: ${hydra.sweep.dir}/.submitit/%j
    nodes: 1
    tasks_per_node: 1
    cpus_per_task: 16
    mem_gb: 1600
    gres: "gpu:h100:1"
    qos: "explore"
    timeout_min: 5760
    setup: ["export DEBUGVAR=$(scontrol show hostnames $SLURM_JOB_NODELIST)",
            export MASTER_ADDR="$(scontrol show hostnames $SLURM_JOB_NODELIST | head -n 1)",
            "export MASTER_PORT=$(for port in $(shuf -i 30000-65500 -n 20); do if [[ $(netstat -tupln 2>&1 | grep $port | wc -l) -eq 0 ]] ; then echo $port; break; fi; done;)",]


seed: 42
window_size: 2
goal_window_size: 2
eval_window_size: 2

batch_size: 16 # TODO: reduce for patch features 
epochs: 5000
eval_freq: 10
eval_on_env_freq: 1
num_env_evals: 100 # 
num_final_evals: 100
num_envs: 10
action_window_size: 10

pred_horizon: 10 # Total seq length to predict to roll out
n_action_steps: 8 # Action steps to roll out

# TODO: is this used??
# goal_dim: 0

wandb:
  project: patch_policy
  entity: ${env_vars.wandb_entity}
train_fraction: 0.9

device: cuda
optim:
  lr: 5e-5
  weight_decay: 2e-4
  betas: [0.9, 0.999]

env:
  gym:
    _target_: envs.libero.libero_env.LiberoEnv
    id: libero_goal
    view_idx: null # use all views
  obs_dim: 60
  act_dim: 7
  views: 2

dataset:
  _target_: datasets.libero.LiberoGoalDataset
  data_directory: ${env_vars.datasets.libero}

data:
  window_size: ${window_size}
  action_window_size: ${action_window_size}
  vqbet_get_future_action_chunk: true
  goal_conditional: future
  future_seq_len: ${goal_window_size}
  min_future_sep: ${action_window_size}
  use_libero_goal: true
  view_idx: null # use all views

save_every: 1
save_path: "${env_vars.save_path}/checkpoints/${env.gym.id}/${now:%Y-%m-%d}/${now:%H-%M-%S}"
load_path: null

model:
  _target_: models.diffusion_policy.diffusion_policy.DiffusionPolicy
  obs_dim: ${encoder.output_dim}
  act_dim: ${env.act_dim}
  goal_dim: ${encoder.output_dim}
  views: ${env.views}
  obs_horizon: ${window_size}
  pred_horizon: ${pred_horizon}
  action_horizon: ${n_action_steps}
  visual_input: true
  data_act_scale: 1
  lr: ${optim.lr}
  weight_decay: ${optim.weight_decay}
  use_transform: null
  n_patches: ${encoder.n_patches} # number of patches along one dimension (e.g. 16 for 16x16 patches)
