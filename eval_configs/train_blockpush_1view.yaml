defaults:
  - env_vars: env_vars
  - encoder: blockpush_dynamo
  - _self_
  - override hydra/launcher: submitit_slurm

ckpt_base_path: /checkpoint/amaia/video/gzhou/exps/patch_policy
  
hydra:
  run:
    dir: ${ckpt_base_path}/outputs/${env.gym.id}/${now:%Y-%m-%d}/${now:%H-%M-%S}
  job:
    chdir: True
  sweep:
    dir: ${ckpt_base_path}/outputs/${env.gym.id}/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    submitit_folder: ${hydra.sweep.dir}/.submitit/%j
    nodes: 1
    tasks_per_node: 1
    cpus_per_task: 16
    mem_gb: 1600
    gres: "gpu:h100:1"
    qos: "explore"
    timeout_min: 5760
    setup: ["export DEBUGVAR=$(scontrol show hostnames $SLURM_JOB_NODELIST)",
            export MASTER_ADDR="$(scontrol show hostnames $SLURM_JOB_NODELIST | head -n 1)",
            "export MASTER_PORT=$(for port in $(shuf -i 30000-65500 -n 20); do if [[ $(netstat -tupln 2>&1 | grep $port | wc -l) -eq 0 ]] ; then echo $port; break; fi; done;)",]


seed: 42
window_size: 3
goal_window_size: 3
eval_window_size: 3
batch_size: 64
epochs: 300
eval_freq: 10
eval_on_env_freq: 100
num_env_evals: 100
num_envs: 10
num_final_evals: 100
action_window_size: 1

goal_dim: 0
train_fraction: 0.9


wandb:
  project: dynamo-repro
  entity: ${env_vars.wandb_entity}

device: cuda
optim:
  lr: 1e-4
  weight_decay: 0.0
  betas: [0.9, 0.999]

env:
  gym:
    _target_: envs.block_pushing.block_pushing_multimodal.BlockPushMultimodalMultiview
    id: blockpush
    view_idx: 0
  goal_dim: ${goal_dim}
  act_dim: 2
  views: 1

dataset:
  _target_: datasets.block_pushing.PushMultiviewTrajectoryDataset
  data_directory: ${env_vars.datasets.block_push}
  view_idx: 0

data:
  window_size: ${window_size}
  action_window_size: ${action_window_size}
  vqbet_get_future_action_chunk: true
  goal_conditional: future
  future_seq_len: ${goal_window_size}
  min_future_sep: ${action_window_size}

save_every: 100
save_path: "${env_vars.save_path}/outputs/${env.gym.id}/${now:%Y-%m-%d}/${now:%H-%M-%S}"
load_path: null

model:
  _target_: models.vq_behavior_transformer.bet.BehaviorTransformer
  obs_dim: ${encoder.output_dim}
  act_dim: ${env.act_dim}
  goal_dim: ${env.goal_dim}
  views: ${env.views}
  vqvae_latent_dim: 512
  vqvae_n_embed: 16
  vqvae_groups: 2
  vqvae_fit_steps: 1614
  vqvae_iters: 300
  n_layer: 6
  n_head: 6
  n_embd: 120
  n_patches: ${encoder.n_patches}
  vqvae_batch_size: 1024
  act_scale: 1
  obs_window_size: ${window_size}
  act_window_size: ${action_window_size}
  offset_loss_multiplier: 100
