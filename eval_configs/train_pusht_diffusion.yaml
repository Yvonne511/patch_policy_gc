defaults:
  - env_vars: env_vars
  # - encoder: pusht_dynamo
  # - encoder: dino_cls
  - encoder: dino_patch # dino_patch_avg_pool
  - _self_

seed: 42
window_size: 5
goal_window_size: 5
eval_window_size: 5

batch_size: 256 # TODO: reduce for patch features 
epochs: 5000
eval_freq: 10
eval_on_env_freq: 100
num_env_evals: 2 # 
num_final_evals: 100
num_final_eval_per_goal: 1
action_window_size: 9

pred_horizon: 13 # Total seq length to predict to roll out
n_action_steps: 8 # Action steps to roll out

goal_dim: 0
wandb:
  project: dynamo-repro
  entity: ${env_vars.wandb_entity}
train_fraction: 0.9

device: cuda
optim:
  lr: 1e-4
  weight_decay: 0.0
  betas: [0.9, 0.999]

env:
  gym:
    _target_: envs.pusht.PushWrapper
    id: pusht
    env:
      _target_: envs.pusht.PushTKeypointsEnv
  obs_dim: 20
  act_dim: 2
  goal_dim: ${goal_dim}
  views: 1

dataset:
  _target_: datasets.pusht.PushTDataset
  data_directory: ${env_vars.datasets.pusht}

data:
  window_size: ${window_size}
  action_window_size: ${action_window_size}
  vqbet_get_future_action_chunk: true
  goal_conditional: future
  future_seq_len: ${goal_window_size}
  min_future_sep: ${action_window_size}

save_every: 1
save_path: "${env_vars.save_path}/checkpoints/${env.gym.id}/${now:%Y-%m-%d}/${now:%H-%M-%S}"
load_path: null

model:
  _target_: models.diffusion_policy.diffusion_policy.DiffusionPolicy
  obs_dim: ${encoder.output_dim}
  act_dim: ${env.act_dim}
  goal_dim: ${env.goal_dim}
  obs_horizon: ${window_size}
  pred_horizon: ${pred_horizon}
  action_horizon: ${n_action_steps}
  visual_input: true
  data_act_scale: 1
  lr: ${optim.lr}
  weight_decay: ${optim.weight_decay}
  use_transform: null
  n_patches: 256 # number of patches along one dimension (e.g. 16 for 16x16 patches)
